# ╔══════════════════════════════════════════════════════════════════╗
# ║          KITTY — Everblush Theme + Glassmorphism                ║
# ║          GPU-accelerated · Crisp · Beautiful                    ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Q: Is Kitty GPU-powered? YES. Kitty uses OpenGL for ALL rendering —
# text, backgrounds, images. It's one of the fastest terminals.
#
# Font haziness fix: switched to JetBrainsMono Nerd Font Mono (the
# strictly-monospaced variant designed for terminals), bumped to 13pt,
# and enabled proper FreeType hinting + ligatures.

# ─── FONTS ─────────────────────────────────────────────────────────
# "Mono" variant keeps nerd icons exactly 1-2 cells wide → no bleed
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Crisp hinting — "auto" lets FreeType pick the best mode per glyph
freetype_load_flags    auto
# Platform compositing prevents the "ghosting/haze" on Linux
text_composition_strategy platform

# JetBrains ligatures — beautiful coding arrows
disable_ligatures        never
font_features JetBrainsMonoNFM-Regular    +calt +liga +zero +ss19
font_features JetBrainsMonoNFM-Bold       +calt +liga +zero +ss19
font_features JetBrainsMonoNFM-Italic     +calt +liga +zero +ss19
font_features JetBrainsMonoNFM-BoldItalic +calt +liga +zero +ss19

# Nudge cell height for perfect line spacing
modify_font cell_height    2px
modify_font underline_position 2

# ─── NERD FONT SYMBOL MAP ───────────────────────────────────────────
# Explicitly route all Nerd Font glyph ranges to JetBrainsMono NF Mono.
# Without this, Kitty may miss icons (especially NF v3 U+F0000+ range).
symbol_map U+23FB-U+23FE,U+2B58 JetBrainsMono Nerd Font Mono
symbol_map U+E000-U+E00D JetBrainsMono Nerd Font Mono
symbol_map U+E0A0-U+E0A3 JetBrainsMono Nerd Font Mono
symbol_map U+E0B0-U+E0C8 JetBrainsMono Nerd Font Mono
symbol_map U+E0CA JetBrainsMono Nerd Font Mono
symbol_map U+E0CC-U+E0D7 JetBrainsMono Nerd Font Mono
symbol_map U+E200-U+E2A9 JetBrainsMono Nerd Font Mono
symbol_map U+E300-U+E3E3 JetBrainsMono Nerd Font Mono
symbol_map U+E5FA-U+E6B5 JetBrainsMono Nerd Font Mono
symbol_map U+E700-U+E7C5 JetBrainsMono Nerd Font Mono
symbol_map U+EA60-U+EC1E JetBrainsMono Nerd Font Mono
symbol_map U+F000-U+F2E0 JetBrainsMono Nerd Font Mono
symbol_map U+F300-U+F375 JetBrainsMono Nerd Font Mono
symbol_map U+F400-U+F533 JetBrainsMono Nerd Font Mono
symbol_map U+F0000-U+F1AF0 JetBrainsMono Nerd Font Mono

# ─── THEME ─────────────────────────────────────────────────────────
# To switch themes: switch-theme <name>  (cyberdream | everblush)
include themes/cyberdream.conf

# ─── CURSOR ────────────────────────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.4
cursor_stop_blinking_after 8.0

# Your cursor trail — kept and tuned
cursor_trail               3
cursor_trail_decay         0.1 0.4
cursor_trail_start_threshold 2

# URL style (non-theme)
url_style               curly

# ─── WINDOW ────────────────────────────────────────────────────────
# Rounded corners are compositor-side on Linux:
#   X11  → add to picom.conf:  corner-radius = 12;
#   KDE  → System Settings > Display > Compositor > enable rounded corners
#   Hyprland → rounding = 12 in hyprland.conf
#   GNOME → install "Rounded Window Corners" extension
#
# Kitty's side: glassmorphism (opacity + blur) makes it look premium
background_opacity       0.93
background_blur          20
window_padding_width     14
# No titlebar — let the compositor decorate
hide_window_decorations  titlebar-only
confirm_os_window_close  0
remember_window_size     yes
initial_window_width     1280
initial_window_height    720

# ─── TAB BAR ───────────────────────────────────────────────────────
tab_bar_edge              top
tab_bar_style             powerline
tab_powerline_style       round
tab_bar_min_tabs          1
tab_bar_margin_height     2.0 0.0

active_tab_font_style     bold
inactive_tab_font_style   normal
# (tab colors and title templates are set by theme include above)

# ─── SCROLLBACK ────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager nvim -c "set signcolumn=no showtabline=0" -

# ─── CLIPBOARD (SSH-safe) ──────────────────────────────────────────
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ─── MOUSE / COPY ON SELECT ────────────────────────────────────────
# Automatically copy selected text to the clipboard (Zellij style)
copy_on_select yes
# (Set to 'no' if you want the green/grey highlight to stay visible)
terminal_select_modifiers none
# Strip trailing whitespace when copying
strip_trailing_spaces smart

# ─── PERFORMANCE ───────────────────────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes
term             xterm-kitty

# ─── KEYBINDINGS ───────────────────────────────────────────────────
# Copy / Paste
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard

# Scrollback
map ctrl+shift+h      show_scrollback

# New tab / window preserving cwd
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+enter  new_window_with_cwd

# Font size on the fly
map ctrl+equal        change_font_size all +0.5
map ctrl+minus        change_font_size all -0.5
map ctrl+0            change_font_size all 0

shell /bin/zsh --login
